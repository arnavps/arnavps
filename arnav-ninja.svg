<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400" shape-rendering="crispEdges">
  <defs>
    <style>
      .float  { animation: float 3.5s ease-in-out infinite; }
      .slash  { animation: slash 2.6s ease-in-out infinite; }
      .spark  { animation: spark 2.6s ease-in-out infinite; }
      .glow   { animation: glow  2s   ease-in-out infinite alternate; }
      .blink  { animation: blink 0.9s step-end infinite; }
      .rain1  { animation: rain  1.7s linear infinite; }
      .rain2  { animation: rain  2.3s linear infinite 0.6s; }
      .rain3  { animation: rain  1.9s linear infinite 1.1s; }
      .rain4  { animation: rain  2.5s linear infinite 0.3s; }
      .scan   { animation: scan  5s   linear infinite; }
      .shadow { animation: shadow 3.5s ease-in-out infinite; }

      @keyframes float {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-10px); }
      }
      @keyframes slash {
        0%,100% { opacity:0; transform: rotate(-35deg) scaleX(0.2); }
        35%,65% { opacity:1; transform: rotate(-20deg) scaleX(1); }
      }
      @keyframes spark {
        0%,100% { opacity:0; transform:scale(0); }
        40%,60% { opacity:1; transform:scale(1); }
      }
      @keyframes glow {
        from { filter: drop-shadow(0 0 3px #00eeff) drop-shadow(0 0 8px #00eeff); }
        to   { filter: drop-shadow(0 0 10px #00eeff) drop-shadow(0 0 20px #00eeff); }
      }
      @keyframes blink {
        0%,100% { opacity:1; } 50% { opacity:0; }
      }
      @keyframes rain {
        0%   { transform:translateY(-40px); opacity:0.8; }
        90%  { opacity:0.5; }
        100% { transform:translateY(410px); opacity:0; }
      }
      @keyframes scan {
        0%   { transform:translateY(-4px); opacity:0.05; }
        100% { transform:translateY(404px); opacity:0.05; }
      }
      @keyframes shadow {
        0%,100% { transform: scaleX(1);   opacity:0.15; }
        50%     { transform: scaleX(0.6); opacity:0.07; }
      }
    </style>
  </defs>

  <!-- BG -->
  <rect width="300" height="400" fill="#05080d"/>

  <!-- matrix rain -->
  <g class="rain1" font-family="monospace" font-size="12" fill="#00ff41" opacity="0.4">
    <text x="8"  y="0">1</text><text x="8"  y="15">忍</text>
    <text x="8"  y="30">0</text><text x="8"  y="45">者</text>
    <text x="8"  y="60">1</text><text x="8"  y="75">ア</text>
  </g>
  <g class="rain2" font-family="monospace" font-size="12" fill="#00ff41" opacity="0.3">
    <text x="24" y="0">0</text><text x="24" y="15">1</text>
    <text x="24" y="30">ナ</text><text x="24" y="45">0</text>
    <text x="24" y="60">1</text>
  </g>
  <g class="rain3" font-family="monospace" font-size="12" fill="#00eeff" opacity="0.25">
    <text x="270" y="0">ジ</text><text x="270" y="15">0</text>
    <text x="270" y="30">1</text><text x="270" y="45">ャ</text>
    <text x="270" y="60">0</text>
  </g>
  <g class="rain4" font-family="monospace" font-size="12" fill="#00ff41" opacity="0.3">
    <text x="284" y="0">1</text><text x="284" y="15">0</text>
    <text x="284" y="30">忍</text><text x="284" y="45">1</text>
    <text x="284" y="60">0</text>
  </g>

  <!-- scanline -->
  <rect width="300" height="6" fill="#00ff41" class="scan"/>

  <!-- ground shadow -->
  <ellipse cx="150" cy="378" rx="65" ry="9" fill="#00ff41" class="shadow"/>

  <!-- ══ NINJA (floating) ══ -->
  <g class="float" transform="translate(60, 20)">

    <!-- scarf trails behind head -->
    <rect x="100" y="50"  width="8"  height="28" fill="#cc0000"/>
    <rect x="108" y="56"  width="7"  height="20" fill="#aa0000"/>
    <rect x="115" y="62"  width="8"  height="14" fill="#880000"/>
    <rect x="123" y="68"  width="7"  height="8"  fill="#660000"/>
    <rect x="98"  y="72"  width="6"  height="20" fill="#aa0000"/>
    <rect x="92"  y="78"  width="6"  height="12" fill="#880000"/>

    <!-- ── HEAD ── -->
    <!-- main hood block -->
    <rect x="30"  y="20"  width="60" height="52" fill="#0f0f1e"/>
    <rect x="26"  y="26"  width="8"  height="38" fill="#0f0f1e"/>
    <rect x="86"  y="26"  width="8"  height="38" fill="#0f0f1e"/>
    <!-- head top rounding -->
    <rect x="34"  y="16"  width="52" height="8"  fill="#0f0f1e"/>
    <rect x="38"  y="12"  width="44" height="8"  fill="#0f0f1e"/>

    <!-- forehead protector band -->
    <rect x="26"  y="20"  width="68" height="12" fill="#1a1a33"/>
    <!-- metal plate -->
    <rect x="34"  y="20"  width="52" height="11" fill="#22224a"/>
    <!-- plate engraving -->
    <rect x="38"  y="23"  width="44" height="2"  fill="#4444aa" opacity="0.9"/>
    <!-- kanji symbol (pixel) -->
    <rect x="56"  y="21"  width="3"  height="8"  fill="#7777ff"/>
    <rect x="50"  y="24"  width="15" height="3"  fill="#7777ff"/>
    <rect x="50"  y="21"  width="5"  height="3"  fill="#7777ff"/>
    <rect x="60"  y="21"  width="5"  height="3"  fill="#7777ff"/>

    <!-- face slot — dark -->
    <rect x="28"  y="44"  width="64" height="16" fill="#120808"/>

    <!-- EYES -->
    <rect x="32"  y="46"  width="20" height="10" fill="#001820"/>
    <rect x="68"  y="46"  width="20" height="10" fill="#001820"/>
    <!-- iris cyan glow -->
    <rect x="34"  y="47"  width="16" height="8"  fill="#00ccee" class="glow"/>
    <rect x="70"  y="47"  width="16" height="8"  fill="#00ccee" class="glow"/>
    <!-- pupil -->
    <rect x="38"  y="49"  width="6"  height="5"  fill="#002233"/>
    <rect x="74"  y="49"  width="6"  height="5"  fill="#002233"/>
    <!-- shine -->
    <rect x="38"  y="48"  width="3"  height="2"  fill="#ffffff"/>
    <rect x="74"  y="48"  width="3"  height="2"  fill="#ffffff"/>

    <!-- lower mask -->
    <rect x="28"  y="60"  width="64" height="18" fill="#0f0f1e"/>
    <!-- mask seam -->
    <rect x="28"  y="60"  width="64" height="2"  fill="#00eeff" opacity="0.25"/>
    <!-- mask nose ridge -->
    <rect x="56"  y="64"  width="8"  height="6"  fill="#0a0a18"/>

    <!-- neck -->
    <rect x="46"  y="78"  width="28" height="10" fill="#0f0f1e"/>

    <!-- ── BODY ── -->
    <rect x="16"  y="88"  width="88" height="76" fill="#0c0c18"/>
    <!-- kimono lapels -->
    <rect x="16"  y="88"  width="22" height="66" fill="#111124"/>
    <rect x="82"  y="88"  width="22" height="66" fill="#111124"/>
    <!-- chest center -->
    <rect x="36"  y="88"  width="48" height="68" fill="#090912"/>

    <!-- RED BELT / SASH -->
    <rect x="16"  y="140" width="88" height="12" fill="#bb0000"/>
    <rect x="16"  y="144" width="88" height="5"  fill="#880000"/>
    <!-- sash knot center -->
    <rect x="50"  y="137" width="20" height="18" fill="#dd1111"/>
    <rect x="53"  y="134" width="14" height="6"  fill="#dd1111"/>

    <!-- kunai holders -->
    <rect x="40"  y="96"  width="5"  height="18" fill="#2a2a44"/>
    <rect x="48"  y="96"  width="5"  height="16" fill="#2a2a44"/>
    <rect x="56"  y="96"  width="5"  height="18" fill="#2a2a44"/>
    <!-- kunai blades tips -->
    <rect x="41"  y="93"  width="3"  height="5"  fill="#9999cc"/>
    <rect x="49"  y="93"  width="3"  height="5"  fill="#9999cc"/>
    <rect x="57"  y="93"  width="3"  height="5"  fill="#9999cc"/>

    <!-- ── LEFT ARM raised (sword) ── -->
    <rect x="0"   y="88"  width="18" height="16" fill="#0c0c18"/>
    <rect x="-4"  y="98"  width="14" height="42" fill="#0c0c18"/>
    <!-- glove -->
    <rect x="-6"  y="136" width="16" height="12" fill="#0f0f1e"/>
    <rect x="-6"  y="146" width="5"  height="7"  fill="#0f0f1e"/>
    <rect x="0"   y="146" width="5"  height="9"  fill="#0f0f1e"/>
    <rect x="6"   y="146" width="5"  height="7"  fill="#0f0f1e"/>

    <!-- ── RIGHT ARM guarding ── -->
    <rect x="102" y="88"  width="18" height="16" fill="#0c0c18"/>
    <rect x="106" y="98"  width="14" height="42" fill="#0c0c18"/>
    <rect x="106" y="136" width="16" height="12" fill="#0f0f1e"/>
    <rect x="106" y="146" width="5"  height="7"  fill="#0f0f1e"/>
    <rect x="112" y="146" width="5"  height="9"  fill="#0f0f1e"/>
    <rect x="118" y="146" width="5"  height="7"  fill="#0f0f1e"/>

    <!-- ── LEGS ── -->
    <rect x="24"  y="164" width="30" height="52" fill="#090912"/>
    <rect x="66"  y="164" width="30" height="52" fill="#090912"/>
    <!-- leg wraps -->
    <rect x="24"  y="176" width="30" height="5"  fill="#cc0000" opacity="0.75"/>
    <rect x="24"  y="192" width="30" height="5"  fill="#cc0000" opacity="0.75"/>
    <rect x="66"  y="176" width="30" height="5"  fill="#cc0000" opacity="0.75"/>
    <rect x="66"  y="192" width="30" height="5"  fill="#cc0000" opacity="0.75"/>
    <!-- tabi boots -->
    <rect x="20"  y="214" width="36" height="12" fill="#0f0f1e"/>
    <rect x="64"  y="214" width="36" height="12" fill="#0f0f1e"/>
    <rect x="18"  y="220" width="10" height="6"  fill="#1a1a2e"/>
    <rect x="88"  y="220" width="10" height="6"  fill="#1a1a2e"/>

    <!-- ── KATANA ── -->
    <!-- tsuka handle -->
    <rect x="-44" y="112" width="36" height="10" fill="#3a1800"/>
    <rect x="-44" y="114" width="36" height="5"  fill="#5a2800"/>
    <!-- tsuba guard -->
    <rect x="-10" y="108" width="10" height="20" fill="#888800"/>
    <rect x="-8"  y="106" width="6"  height="24" fill="#aaaa22"/>
    <!-- blade long -->
    <rect x="-82" y="114" width="72" height="5"  fill="#c8c8de"/>
    <rect x="-82" y="114" width="72" height="2"  fill="#eeeeff"/>
    <!-- blade tip -->
    <rect x="-90" y="114" width="10" height="8"  fill="#c8c8de" transform="skewY(-25)"/>
    <!-- edge highlight -->
    <rect x="-82" y="114" width="72" height="1"  fill="#ffffff" opacity="0.7"/>

  </g>
  <!-- end float -->

  <!-- ── KATANA SLASH ARC ── -->
  <g class="slash" transform-origin="100 148" style="transform-box: fill-box;">
    <rect x="40"  y="130" width="140" height="5"  fill="#00eeff" opacity="0.9" transform="rotate(-22 40 130)"/>
    <rect x="40"  y="136" width="120" height="3"  fill="#ffffff" opacity="0.6" transform="rotate(-22 40 136)"/>
    <rect x="40"  y="141" width="90"  height="2"  fill="#00eeff" opacity="0.35" transform="rotate(-22 40 141)"/>
  </g>

  <!-- spark burst -->
  <g class="spark">
    <rect x="174" y="118" width="6" height="6" fill="#ffffff"/>
    <rect x="182" y="110" width="4" height="4" fill="#00eeff"/>
    <rect x="166" y="124" width="4" height="4" fill="#ffff44"/>
    <rect x="186" y="120" width="3" height="3" fill="#ffffff"/>
    <rect x="178" y="106" width="3" height="3" fill="#00eeff"/>
    <rect x="170" y="112" width="3" height="3" fill="#ffff44"/>
  </g>

  <!-- corner HUD brackets -->
  <rect x="0"   y="0"   width="20" height="3"  fill="#00ff41" opacity="0.5"/>
  <rect x="0"   y="0"   width="3"  height="20" fill="#00ff41" opacity="0.5"/>
  <rect x="280" y="0"   width="20" height="3"  fill="#00ff41" opacity="0.5"/>
  <rect x="297" y="0"   width="3"  height="20" fill="#00ff41" opacity="0.5"/>
  <rect x="0"   y="397" width="20" height="3"  fill="#00ff41" opacity="0.5"/>
  <rect x="0"   y="380" width="3"  height="20" fill="#00ff41" opacity="0.5"/>
  <rect x="280" y="397" width="20" height="3"  fill="#00ff41" opacity="0.5"/>
  <rect x="297" y="380" width="3"  height="20" fill="#00ff41" opacity="0.5"/>

</svg>
