name: LOC Stats
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate LOC stats
        uses: nicknisi/loc-stats-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
